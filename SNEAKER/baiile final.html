<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SNAKE 3D: PLAYLIST COMPLETA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ff88;
            font-size: 26px; font-weight: bold; text-shadow: 2px 2px 10px #000; z-index: 10;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; color: white; text-align: center;
        }
        button {
            padding: 20px 60px; font-size: 1.8em; cursor: pointer;
            background: #ff0055; color: #fff; border: none; border-radius: 50px;
            font-weight: bold; box-shadow: 0 0 25px #ff0055; transition: 0.3s;
        }
        button:hover { transform: scale(1.1); background: #00ff88; box-shadow: 0 0 25px #00ff88; color: #000; }
        #track-info { margin-top: 20px; color: #00ff88; font-weight: bold; font-style: italic; }
    </style>
</head>
<body>

    <div id="ui">RATOS: <span id="score">0</span></div>

    <div id="overlay">
        <h1 style="font-size: 3.5em; margin:0; color: #00ff88;">SNAKE 3D</h1>
        <h2 style="font-weight: 300;">PLAYLIST ATUALIZADA</h2>
        <br>
        <button id="btn-start">SOLTAR O SOM</button>
        <div id="track-info">Carregando trilha...</div>
    </div>

    <audio id="player" crossorigin="anonymous" loop></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, food, snake = [];
        let direction = { x: 0.35, z: 0 }, nextDirection = { x: 0.35, z: 0 };
        let score = 0, gameActive = false, lastTime = 0;
        const gridSize = 24;

        // --- PLAYLIST ATUALIZADA COM OS 3 LINKS ---
        const playlist = [
            { name: "Rap do Silva (V1)", url: "https://raw.githubusercontent.com/akiratank01-creator/audio-assets/main/SNEAKER/silva.mp3" },
            { name: "Rap do Solitário", url: "https://raw.githubusercontent.com/akiratank01-creator/audio-assets/main/SNEAKER/solitario.mp3" },
            { name: "Rap do Silva (V2)", url: "https://raw.githubusercontent.com/akiratank01-creator/audio-assets/main/SNEAKER/silva.mp3" }
        ];

        function getNextTrack() {
            let history = JSON.parse(localStorage.getItem('snakeMusicHistory') || "[]");
            let available = playlist.filter(t => !history.includes(t.name));
            
            if (available.length === 0) {
                history = [];
                available = playlist;
            }
            
            const track = available[Math.floor(Math.random() * available.length)];
            history.push(track.name);
            localStorage.setItem('snakeMusicHistory', JSON.stringify(history));
            return track;
        }

        const currentTrack = getNextTrack();
        const audio = document.getElementById('player');
        audio.src = currentTrack.url;
        document.getElementById('track-info').innerText = "Tocando agora: " + currentTrack.name;

        document.getElementById('btn-start').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            audio.play().catch(e => console.log("Áudio bloqueado pelo navegador. Clique novamente."));
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 18, 20);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            scene.add(new THREE.GridHelper(gridSize, gridSize, 0x00ff88, 0x222222));

            // Inicializar Cobra
            for(let i=0; i<6; i++) {
                const seg = new THREE.Mesh(
                    new THREE.SphereGeometry(0.5, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.3 })
                );
                seg.position.set(-i * 0.7, 0.5, 0);
                scene.add(seg);
                snake.push(seg);
            }

            createFood();

            window.addEventListener('keydown', e => {
                const s = 0.35;
                if(e.key === 'ArrowUp' && direction.z === 0) nextDirection = { x: 0, z: -s };
                if(e.key === 'ArrowDown' && direction.z === 0) nextDirection = { x: 0, z: s };
                if(e.key === 'ArrowLeft' && direction.x === 0) nextDirection = { x: -s, z: 0 };
                if(e.key === 'ArrowRight' && direction.x === 0) nextDirection = { x: s, z: 0 };
            });

            gameActive = true;
            requestAnimationFrame(animate);
        }

        function createFood() {
            if(food) scene.remove(food);
            food = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 0.5, 0.7),
                new THREE.MeshStandardMaterial({color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 0.5})
            );
            const r = (gridSize / 2) - 2;
            food.position.set(Math.random()*r*2-r, 0.5, Math.random()*r*2-r);
            scene.add(food);
        }

        function animate(t) {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            if(t - lastTime >= 1000/30) {
                direction = nextDirection;
                for(let i = snake.length - 1; i > 0; i--) {
                    snake[i].position.lerp(snake[i-1].position, 0.4);
                }
                snake[0].position.x += direction.x;
                snake[0].position.z += direction.z;

                if(Math.abs(snake[0].position.x) > gridSize/2 || Math.abs(snake[0].position.z) > gridSize/2) die();

                if(snake[0].position.distanceTo(food.position) < 1.1) {
                    score++;
                    document.getElementById('score').innerText = score;
                    createFood();
                    const last = snake[snake.length-1].clone();
                    snake.push(last);
                    scene.add(last);
                    const newColor = new THREE.Color().setHSL(Math.random(), 1, 0.5);
                    snake.forEach(s => s.material.color.copy(newColor));
                }

                if(food) food.rotation.y += 0.1;
                renderer.render(scene, camera);
                lastTime = t;
            }
        }

        function die() {
            gameActive = false;
            audio.pause();
            alert("FIM DE JOGO! Ratos coletados: " + score);
            location.reload();
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
